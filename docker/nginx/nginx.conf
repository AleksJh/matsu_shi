events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Docker internal DNS — re-resolve upstreams every 10s so nginx
    # picks up new container IPs after restarts without needing a reload.
    resolver 127.0.0.11 valid=10s;

    # Redirect HTTP -> HTTPS
    server {
        listen 80;
        server_name matsushi.xyz www.matsushi.xyz;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name matsushi.xyz www.matsushi.xyz;

        ssl_certificate     /etc/letsencrypt/live/matsushi.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/matsushi.xyz/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # SSE endpoint
        location /api/v1/chat/query {
            set $backend http://backend:8000;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            add_header X-Accel-Buffering no;
            proxy_read_timeout 300s;
        }

        location /api/ {
            set $backend http://backend:8000;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /webhook/ {
            set $backend http://backend:8000;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /admin/ {
            set $admin http://admin:5174;
            proxy_pass $admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection upgrade;
        }

        location / {
            set $frontend http://frontend:5173;
            proxy_pass $frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection upgrade;
        }
    }
}
